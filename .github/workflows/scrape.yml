name: Daily scrape + extract + rematch

on:
  schedule:
    - cron: "0 8 * * *"   # 08:00 UTC = 05:00 Chile time
  workflow_dispatch:       # allow manual trigger

concurrency:
  group: pipeline-singleton
  cancel-in-progress: false  # second trigger waits; does NOT cancel the running job

jobs:
  pipeline:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper (fetch + dedup + upload HTML)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python -m scraper.run

      - name: Run extractor (Claude → listings table)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python -m scraper.extract_run

      - name: Trigger rematch for all users
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python -m matching.rematch_all
